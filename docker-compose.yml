services:
  app:
    build: .
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - DRAGONFLY_HOST=dragonfly
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    deploy:
      replicas: 3  # Запускаем сразу 3 экземпляра приложения для балансировки
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: highload-auth-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: highload-auth-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: highload-auth-dragonfly
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    ulimits:
      memlock: -1

volumes:
  postgres_data:
  dragonfly_data:
