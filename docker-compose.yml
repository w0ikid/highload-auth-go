services:
  postgres:
    image: postgres:16-alpine
    container_name: highload-auth-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: highload-auth-dragonfly
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
    restart: unless-stopped
    ulimits:
      memlock: -1

volumes:
  postgres_data:
  dragonfly_data:
